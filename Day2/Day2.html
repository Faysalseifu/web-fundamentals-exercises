<!DOCTYPE html><html lang="en">
<head>

</head>
<body>
     <h2>2. Float-Based Layout (2000s)</h2>
    <!-- Float mechanisms originally used for floating images alongside text but hijacked for structural columns -->
    <div class="float-container clearfix">
        <div class="float-sidebar">Sidebar (Float Left)</div>
        <div class="float-content">Main Content (Float Left)</div>
    </div>
    <div class="float-footer">Footer (Clear Both)</div>


</body>
</html>
