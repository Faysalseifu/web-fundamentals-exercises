<!DOCTYPE html>
<html>

<head>
<style>

body{
   font-family:Arial;
}

form{
   width:300px;
   margin:auto;
   padding:20px;
   border:1px solid #ccc;
   border-radius:10px;
}

input,
textarea,
select{
   width:100%;
   padding:10px;
   margin-top:5px;
   margin-bottom:15px;
}

button{
   width:100%;
   padding:10px;
}

</style>
</head>

<body>

<form>

<h2>Contact Form</h2>

<label>Name</label>
<input type="text" required>

<label>Email</label>
<input type="email" required>

<label>Country</label>

<select>
   <option>Ethiopia</option>
   <option>Turkey</option>
   <option>Canada</option>
</select>

<label>Message</label>

<textarea rows="5"></textarea>

<button type="submit">
   Send Message
</button>

</form>

</body>
</html>
